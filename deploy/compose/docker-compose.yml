version: "3.9"

services:
  api:
    build: .
    command: go run ./cmd/api
    ports:
      - "8080:8080"

  worker:
    build: .
    command: go run ./cmd/worker

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
