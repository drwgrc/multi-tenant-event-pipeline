name: multi-tenant-event-pipeline

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    command: go run ./cmd/api
    environment:
      APP_ENV: development
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/event_pipeline?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SIGNING_KEY: development-signing-key
      INGEST_MAX_BODY_BYTES: "1048576"
      INGEST_MAX_BATCH_EVENTS: "1000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    command: go run ./cmd/worker
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/event_pipeline?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SIGNING_KEY: development-signing-key
      INGEST_MAX_BODY_BYTES: "1048576"
      INGEST_MAX_BATCH_EVENTS: "1000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: event_pipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
